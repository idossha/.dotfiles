[tui]
status_line = ["model-with-reasoning", "current-dir", "model", "project-name", "git-branch", "context-used"]

[tui.model_availability_nux]
"gpt-5.5" = 4

# BEGIN DOTFILES AGENT MCP
[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/idohaber"]

[mcp_servers.mermaid]
command = "npx"
args = ["-y", "mermaid-mcp-server"]

[mcp_servers.openalex]
command = "npx"
args = ["-y", "openalex-research-mcp"]

[mcp_servers.openalex.tools.batch_resolve_references]
approval_mode = "approve"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp"]

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.svg]
command = "npx"
args = ["-y", "mcp-svg"]

[features]
memories = true
terminal_resize_reflow = true
external_migration = true
prevent_idle_sleep = true

# END DOTFILES AGENT MCP
